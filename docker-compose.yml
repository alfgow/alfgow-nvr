services:
  alfgow-nvr:
    build: .
    container_name: alfgow-nvr
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - type: bind
        source: /mnt/storage-alfgow/alfgow-nvr
        target: /mnt/storage-alfgow/alfgow-nvr
        bind:
          propagation: rshared

  nvr-supervisor:
    build: .
    container_name: nvr-supervisor
    restart: unless-stopped
    command: ["node", "supervisor.js"]
    depends_on:
      - alfgow-nvr
    environment:
      SUPERVISOR_BASE_URL: http://alfgow-nvr:5000
      SUPERVISOR_STORAGE_ROOT: /mnt/storage-alfgow/alfgow-nvr
      SUPERVISOR_CHECK_INTERVAL_SECONDS: 30
      SUPERVISOR_STARTUP_GRACE_SECONDS: 90
      SUPERVISOR_LIVE_STALE_SECONDS: 20
      SUPERVISOR_RECORDINGS_STALE_SECONDS: 180
      SUPERVISOR_FAILURE_THRESHOLD: 2
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - type: bind
        source: /mnt/storage-alfgow/alfgow-nvr
        target: /mnt/storage-alfgow/alfgow-nvr
        bind:
          propagation: rshared

  ffmpeg-cam1:
    image: linuxserver/ffmpeg:latest
    container_name: ffmpeg-cam1
    restart: unless-stopped
    command: >
      -rtsp_transport tcp
      -fflags nobuffer
      -i rtsp://admin:D210512d@192.168.0.122:554/Streaming/Channels/101
      -an
      -c:v libx264
      -preset ultrafast
      -tune zerolatency
      -profile:v baseline
      -level 3.1
      -pix_fmt yuv420p
      -b:v 1800k
      -maxrate 2200k
      -bufsize 1800k
      -g 12
      -keyint_min 12
      -sc_threshold 0
      -bf 0
      -force_key_frames 'expr:gte(t,n_forced*0.5)'
      -f hls
      -hls_time 1
      -hls_list_size 2
      -hls_delete_threshold 1
      -hls_flags delete_segments+independent_segments+omit_endlist
      /mnt/storage-alfgow/alfgow-nvr/live/cam1/index.m3u8
    volumes:
      - type: bind
        source: /mnt/storage-alfgow/alfgow-nvr
        target: /mnt/storage-alfgow/alfgow-nvr
        bind:
          propagation: rshared

  ffmpeg-cam2:
    image: linuxserver/ffmpeg:latest
    container_name: ffmpeg-cam2
    restart: unless-stopped
    command: >
      -rtsp_transport tcp
      -fflags nobuffer
      -i rtsp://admin:D210512d@192.168.0.122:554/Streaming/Channels/201
      -an
      -c:v libx264
      -preset ultrafast
      -tune zerolatency
      -profile:v baseline
      -level 3.1
      -pix_fmt yuv420p
      -b:v 1800k
      -maxrate 2200k
      -bufsize 1800k
      -g 12
      -keyint_min 12
      -sc_threshold 0
      -bf 0
      -force_key_frames 'expr:gte(t,n_forced*0.5)'
      -f hls
      -hls_time 1
      -hls_list_size 2
      -hls_delete_threshold 1
      -hls_flags delete_segments+independent_segments+omit_endlist
      /mnt/storage-alfgow/alfgow-nvr/live/cam2/index.m3u8
    volumes:
      - type: bind
        source: /mnt/storage-alfgow/alfgow-nvr
        target: /mnt/storage-alfgow/alfgow-nvr
        bind:
          propagation: rshared

  recorder-cam1:
    image: linuxserver/ffmpeg:latest
    container_name: recorder-cam1
    restart: unless-stopped
    entrypoint: /bin/sh
    command: >
      -c "mkdir -p /mnt/storage-alfgow/alfgow-nvr/recordings/cam1 &&
      ffmpeg
      -rtsp_transport tcp
      -i rtsp://admin:D210512d@192.168.0.122:554/Streaming/Channels/101
      -an
      -c:v copy
      -f hls
      -hls_time 60
      -hls_list_size 2880
      -hls_delete_threshold 30
      -hls_flags delete_segments+program_date_time+omit_endlist
      -strftime 1
      -hls_segment_filename /mnt/storage-alfgow/alfgow-nvr/recordings/cam1/%Y%m%dT%H%M%S.ts
      /mnt/storage-alfgow/alfgow-nvr/recordings/cam1/index.m3u8"
    volumes:
      - type: bind
        source: /mnt/storage-alfgow/alfgow-nvr
        target: /mnt/storage-alfgow/alfgow-nvr
        bind:
          propagation: rshared

  recorder-cam2:
